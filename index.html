    function startQuiz(subjectKey) {
        selectedSubjectKey = subjectKey;
        const allQuestions = quizDatabase[subjectKey].questions;
        
        if (selectedLevelFilter === "ทั้งหมด") {
            currentQuestions = [...allQuestions];
        } else {
            currentQuestions = allQuestions.filter(q => q.level === selectedLevelFilter);
        }

        if (currentQuestions.length === 0) {
            alert(`ขณะนี้ไม่มีข้อสอบในระดับชั้น [${selectedLevelFilter}] สำหรับวิชานี้ กรุณาแจ้งแอดมินแก้ไขคลังข้อสอบครับ`);
            return;
        }

        currentQuestIdx = 0;
        scoreCorrect = 0;
        scoreWrong = 0;
        showQuizQuestion();
    }

    function showQuizQuestion() {
        const qData = currentQuestions[currentQuestIdx];
        timeLeft = TIME_LIMIT;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-count').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                handleQuizAnswer(null, true); // หมดเวลา
            }
        }, 1000);

        const progressPercent = ((currentQuestIdx) / currentQuestions.length) * 100;

        let optionsHtml = "";
        qData.options.forEach(opt => {
            optionsHtml += `<button class="btn-option" onclick="handleQuizAnswer('${opt}', false)">${opt}</button>`;
        });

        document.getElementById('dynamic-main-container').innerHTML = `
            <div class="quiz-card-container screen-fade">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="score-board">🧬 ${quizDatabase[selectedSubjectKey].title}</div>
                    <div class="timer-badge">⏳ เหลือเวลา: <span id="timer-count">${timeLeft}</span> วินาที</div>
                </div>

                <div class="progress-container">
                    <div class="progress-label">
                        <span>ความคืบหน้าข้อสอบ</span>
                        <span>ข้อที่ ${currentQuestIdx + 1} / ${currentQuestions.length}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progressPercent}%;"></div>
                    </div>
                </div>

                <div style="text-align: left; margin-bottom: 10px; font-size: 13px; color: var(--text-sub); font-weight:600;">
                    📍 ด่านความรู้: ${qData.stage || 'ทั่วไป'} | ผู้ออกข้อสอบ: ${qData.creator || 'ระบบ'}
                </div>
                <h3 id="question-text">${qData.question}</h3>
                <div class="options-container">${optionsHtml}</div>
            </div>
        `;
    }

    function handleQuizAnswer(selectedOpt, isTimeout) {
        clearInterval(timerInterval);
        const qData = currentQuestions[currentQuestIdx];
        
        if (isTimeout) {
            scoreWrong++;
            alert(`หมดเวลาเสียก่อน! คำตอบที่ถูกต้องคือ: ${qData.correct}`);
        } else if (selectedOpt === qData.correct) {
            scoreCorrect++;
        } else {
            scoreWrong++;
            alert(`คำตอบยังไม่ถูกใจ! ข้อที่ถูกคือ: ${qData.correct}`);
        }

        currentQuestIdx++;
        if (currentQuestIdx < currentQuestions.length) {
            showQuizQuestion();
        } else {
            showQuizResult();
        }
    }

    function startAdventureGameplay() {
        advHp = 100;
        advMaxHp = 100;
        advStage = 1;
        generateNextMonster();
    }

    function generateNextMonster() {
        const monsterList = [
            { name: "สไลม์อักษรดิ่ง", emoji: "💧", hp: 40 },
            { name: "กอบลินคณิตศาสตร์", emoji: "👺", hp: 60 },
            { name: "โกเลมหินไวยากรณ์", emoji: "🗿", hp: 80 },
            { name: "ไซคลอปส์ฟิสิกส์เดือด", emoji: "👁️", hp: 100 },
            { name: "บอสมังกรโบราณวิทยาการ", emoji: "🐉", hp: 130 }
        ];

        // สุ่มมอนสเตอร์ตามระดับด่าน
        let index = (advStage - 1) % monsterList.length;
        let baseMonster = monsterList[index];
        
        advMonsterName = baseMonster.name + ` (ด่านที่ ${advStage})`;
        advMonsterEmoji = baseMonster.emoji;
        // เพิ่มพลังชีวิตมอนสเตอร์ตามจำนวนลูปที่วนรอบด่าน
        let loopMultiplier = Math.floor((advStage - 1) / monsterList.length) + 1;
        advMonsterMaxHp = baseMonster.hp * loopMultiplier;
        advMonsterHp = advMonsterMaxHp;

        nextAdventureQuestion();
    }

    function nextAdventureQuestion() {
        // ดึงข้อสอบแบบสุ่มจากทุกวิชาในคลัง
        const subjects = Object.keys(quizDatabase);
        const randomSubKey = subjects[Math.floor(Math.random() * subjects.length)];
        const questionsPool = quizDatabase[randomSubKey].questions;

        if(!questionsPool || questionsPool.length === 0) {
            // ป้องกันระบบค้างกรณีคลังข้อสอบหลักว่างเปล่า
            advCurrentQuestion = {
                question: "1 + 1 เท่ากับเท่าไหร่?",
                options: ["2", "3", "4", "5"],
                correct: "2",
                subjectTitle: "คำถามฉุกเฉิน"
            };
        } else {
            let q = questionsPool[Math.floor(Math.random() * questionsPool.length)];
            advCurrentQuestion = {
                question: q.question,
                options: [...q.options],
                correct: q.correct,
                subjectTitle: quizDatabase[randomSubKey].title
            };
        }

        renderAdventureBattleScreen();
    }

    function renderAdventureBattleScreen() {
        let optionsHtml = "";
        advCurrentQuestion.options.forEach(opt => {
            optionsHtml += `<button class="btn-option" style="padding:14px; font-size:14px;" onclick="submitAdventureAnswer('${opt}')">${opt}</button>`;
        });

        let playerHpPercent = (advHp / advMaxHp) * 100;
        let monsterHpPercent = (advMonsterHp / advMonsterMaxHp) * 100;

        document.getElementById('dynamic-main-container').innerHTML = `
            <div class="quiz-card-container screen-fade" style="max-width: 750px;">
                <!-- ส่วนแสดงสถานะการต่อสู้ -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid var(--border-line); margin-bottom: 25px; text-align: left;">
                    <!-- ฝั่งผู้เล่น -->
                    <div>
                        <div style="font-weight:700; font-size:15px; color:var(--text-main);">🧑‍จัด อัศวิน ${playerName || 'ผู้กล้า'}</div>
                        <div class="hp-bar-bg">
                            <div class="hp-bar-fill" style="width: ${playerHpPercent}%; background: #22c55e;"></div>
                        </div>
                        <div style="font-size:12px; color:var(--text-sub); margin-top:4px;">HP: ${advHp} / ${advMaxHp}</div>
                    </div>
                    <!-- ฝั่งมอนสเตอร์ -->
                    <div style="text-align: right;">
                        <div style="font-weight:700; font-size:15px; color:var(--adventure-red);">${advMonsterEmoji} ${advMonsterName}</div>
                        <div class="hp-bar-bg">
                            <div class="hp-bar-fill" style="width: ${monsterHpPercent}%; background: #ef4444; float: right;"></div>
                        </div>
                        <div style="font-size:12px; color:var(--text-sub); margin-top:4px; clear: both;">HP: ${advMonsterHp} / ${advMonsterMaxHp}</div>
                    </div>
                </div>

                <!-- กล่องโจทย์คำถาม -->
                <div style="text-align: left; margin-bottom: 10px; font-size: 13px; color: var(--text-sub); font-weight:600;">
                    ⚔️ ศาสตร์แห่งการโจมตี: ${advCurrentQuestion.subjectTitle}
                </div>
                <h3 id="question-text" style="font-size:18px; margin-bottom:20px;">${advCurrentQuestion.question}</h3>
                
                <div class="options-container">${optionsHtml}</div>
            </div>
        `;
    }

    function submitAdventureAnswer(chosen) {
        if(chosen === advCurrentQuestion.correct) {
            // ตอบถูก! โจมตีมอนสเตอร์ (ดาเมจสุ่ม 30 - 45)
            let damage = Math.floor(Math.random() * 16) + 30;
            advMonsterHp -= damage;
            if(advMonsterHp < 0) advMonsterHp = 0;
            alert(`✨ ถูกต้อง! คุณร่ายเวทมนตร์โจมตีสร้างความเสียหายให้กับมอนสเตอร์ ${damage} หน่วย!`);
            
            if(advMonsterHp <= 0) {
                // มอนสเตอร์ตาย ได้รับเหรียญโบนัส
                let prizeCoins = 15 + (advStage * 2);
                fmCoins += prizeCoins;
                localStorage.setItem('fm_coins', fmCoins);
                alert(`🎉 ยอดเยี่ยม! คุณสามารถปราบลบ ${advMonsterName} ลงได้สำเร็จ! ได้รับรางวัล 🪙 ${prizeCoins} เหรียญทอง`);
                advStage++;
                generateNextMonster();
                return;
            }
        } else {
            // ตอบผิด! โดนมอนสเตอร์สวนกลับ (ดาเมจสุ่ม 20 - 35)
            let damage = Math.floor(Math.random() * 16) + 20;
            advHp -= damage;
            if(advHp < 0) advHp = 0;
            alert(`💥 ผิดพลาด! คำตอบที่ถูกคือ [ ${advCurrentQuestion.correct} ] มอนสเตอร์สวนกลับทำความเสียหายแก่คุณ ${damage} หน่วย!`);

            if(advHp <= 0) {
                // ผู้เล่นตาย สิ้นสุดเกม
                document.getElementById('dynamic-main-container').innerHTML = `
                    <div class="quiz-card-container screen-fade" style="max-width:500px; text-align:center;">
                        <div style="font-size:60px; margin-bottom:15px;">💀</div>
                        <h2 style="color:var(--error-red); font-size:26px; margin-bottom:10px;">คุณหมดสภาพการต่อสู้!</h2>
                        <p style="color:var(--text-sub); font-size:14px; margin-bottom:20px;">พ่ายแพ้ให้กับด่านความรู้ของ ${advMonsterName}</p>

                        <div style="background:#f8fafc; border:1px solid var(--border-line); border-radius:16px; padding:20px; margin-bottom:25px;">
                            <div style="font-size:15px; margin-bottom:5px;">สถิติการเดินทัพในรอบนี้</div>
                            <div style="font-size:36px; font-weight:800; color:var(--adventure-red);">ด่านที่ ${advStage}</div>
                        </div>

                        <div style="display:flex; gap:15px; justify-content:center;">
                            <button class="btn-primary" style="background:var(--adventure-red);" onclick="startAdventureGameplay()">🔄 เกิดใหม่ลุยอีกรอบ</button>
                            <button class="btn-secondary" onclick="showQuizAdventureHub()">🔙 กลับแดชบอร์ด</button>
                        </div>
                    </div>
                `;
                return;
            }
        }

        // หากยังไม่ตายทั้งคู่ ให้ขึ้นข้อต่อไป
        nextAdventureQuestion();
    }

    // ==========================================
    // 🧮 กระบวนการเล่นเกม Fast Math Game Loop
    // ==========================================
    function startFastMathGameplay() {
        fmScore = 0;
        fmStreak = 0;
        fmTimeLimitPerQ = 8; 
        nextFastMathQuestion();
    }

    function nextFastMathQuestion() {
        const operators = ['+', '-', '*'];
        if(fmScore > 10) operators.push('/'); 
        const op = operators[Math.floor(Math.random() * operators.length)];
        
        let num1, num2, questionText, answerVal;
        
        if (op === '+') {
            num1 = Math.floor(Math.random() * 40) + 5;
            num2 = Math.floor(Math.random() * 40) + 5;
            questionText = `${num1} + ${num2} = ?`;
            answerVal = num1 + num2;
        } else if (op === '-') {
            num1 = Math.floor(Math.random() * 50) + 10;
            num2 = Math.floor(Math.random() * num1); 
            questionText = `${num1} - ${num2} = ?`;
            answerVal = num1 - num2;
        } else if (op === '*') {
            num1 = Math.floor(Math.random() * 11) + 2;
            num2 = Math.floor(Math.random() * 12) + 2;
            questionText = `${num1} × ${num2} = ?`;
            answerVal = num1 * num2;
        } else {
            num2 = Math.floor(Math.random() * 10) + 2;
            answerVal = Math.floor(Math.random() * 10) + 2;
            num1 = num2 * answerVal;
            questionText = `${num1} ÷ ${num2} = ?`;
        }

        fmCurrentQuestion = { text: questionText, ans: answerVal };

        let optionsSet = new Set([answerVal]);
        while(optionsSet.size < 4) {
            let offset = (Math.floor(Math.random() * 7) + 1) * (Math.random() > 0.5 ? 1 : -1);
            if(answerVal + offset >= 0) optionsSet.add(answerVal + offset);
        }
        let arrOptions = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        let currentLimit = Math.max(3, fmTimeLimitPerQ - Math.floor(fmScore / 5)); 
        timeLeft = currentLimit;

        clearInterval(fmTimer);
        fmTimer = setInterval(() => {
            timeLeft--;
            const timerLabel = document.getElementById('fm-game-timer');
            if(timerLabel) timerLabel.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(fmTimer);
                endFastMathGame("TIMEOUT");
            }
        }, 1000);

        let optionsButtons = "";
        arrOptions.forEach(opt => {
            optionsButtons += `<button class="btn-option" style="text-align:center; font-size:20px; font-weight:700;" onclick="submitFmAnswer(${opt})">${opt}</button>`;
        });

        document.getElementById('dynamic-main-container').innerHTML = `
            <div class="quiz-card-container screen-fade" style="max-width: 600px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span class="score-board" style="background:#fae8ff; border-color:#f5d0fe; color:var(--game-purple);">✨ คะแนนปัจจุบัน: ${fmScore}</span>
                    <span class="timer-badge">⏳ บีบเวลา: <span id="fm-game-timer">${timeLeft}</span> วินาที</span>
                </div>

                <div class="fm-question-panel">
                    ${fmStreak > 2 ? `<div class="fm-streak-pop">🔥 คอมโบ ×${fmStreak}</div>` : ''}
                    ${fmCurrentQuestion.text}
                </div>

                <div class="options-container" style="margin-top:20px;">
                    ${optionsButtons}
                </div>
            </div>
        `;
    }

    function submitFmAnswer(chosen) {
        clearInterval(fmTimer);
        if (chosen === fmCurrentQuestion.ans) {
            fmScore++;
            fmStreak++;
            
            let coinGained = 1;
            if(fmStreak >= 5) coinGained = 2;
            if(fmStreak >= 10) coinGained = 3;
            fmCoins += coinGained;
            fmXp += 5;

            localStorage.setItem('fm_coins', fmCoins);
            localStorage.setItem('fm_xp', fmXp);

            nextFastMathQuestion();
        } else {
            if (hasShieldActive) {
                hasShieldActive = false;
                alert("🛡️ โล่ทำงาน! คำตอบข้อนี้ผิด แต่ระบบช่วยรักษาคอมโบเดิมของคุณไว้ให้ลุยต่อ!");
                nextFastMathQuestion();
            } else {
                endFastMathGame("WRONG");
            }
        }
    }

    function endFastMathGame(reason) {
        clearInterval(fmTimer);
        
        let msg = reason === "TIMEOUT" ? "🕒 คุณคิดช้าเกินไปจนหมดเวลาตอบข้อซักถามแล้ว!" : "💥 คุณคำนวณตัวเลขผิดพลาดน่ะครับ!";
        
        let isNewHigh = false;
        if (fmScore > fmHighScore) {
            fmHighScore = fmScore;
            localStorage.setItem('fm_highscore', fmHighScore);
            isNewHigh = true;
        }

        document.getElementById('dynamic-main-container').innerHTML = `
            <div class="quiz-card-container screen-fade" style="max-width:500px; text-align:center;">
                <div style="font-size:60px; margin-bottom:15px;">🏁</div>
                <h2 style="color:var(--error-red); font-size:26px; margin-bottom:10px;">สิ้นสุดเกมการแข่งขัน!</h2>
                <p style="color:var(--text-sub); font-size:14px; margin-bottom:20px;">${msg}</p>

                <div style="background:#f8fafc; border:1px solid var(--border-line); border-radius:16px; padding:20px; margin-bottom:25px;">
                    <div style="font-size:15px; margin-bottom:5px;">คะแนนรอบนี้ที่คุณทำได้</div>
                    <div style="font-size:36px; font-weight:800; color:var(--game-purple);">${fmScore} <span style="font-size:16px; font-weight:500;">ข้อ</span></div>
                    ${isNewHigh ? `<div style="color:var(--success-green); font-size:13px; font-weight:700; margin-top:5px;">🎉 ยอดเยี่ยม! ค้นพบสถิติใหม่สูงสุดประจำตัวของคุณสำเร็จ</div>` : ''}
                </div>

                <div style="display:flex; gap:15px; justify-content:center;">
                    <button class="btn-primary" style="background:var(--game-purple);" onclick="startFastMathGameplay()">🔄 เล่นใหม่อีกรอบ</button>
                    <button class="btn-secondary" onclick="showFastMathHub()">🔙 กลับแดชบอร์ด</button>
                </div>
            </div>
        `;
    }

    // ==========================================
    // 🛠️ ส่วนควบคุมบริหารงาน: อาจารย์/แอดมิน (Admin Panel)
    // ==========================================

    function saveQuestionForm() {
        const subKey = document.getElementById('add-subject').value;
        const level = document.getElementById('add-level').value;
        const stage = document.getElementById('add-stage').value.trim();
        const question = document.getElementById('add-question').value.trim();
        const opt1 = document.getElementById('add-opt1').value.trim();
        const opt2 = document.getElementById('add-opt2').value.trim();
        const opt3 = document.getElementById('add-opt3').value.trim();
        const opt4 = document.getElementById('add-opt4').value.trim();
        const correct = document.getElementById('add-correct').value.trim();
        const creator = document.getElementById('add-creator').value;

        if(!question || !opt1 || !opt2 || !opt3 || !opt4 || !correct) {
            alert("กรุณากรอกข้อมูลโจทย์ ตัวเลือกทั้ง 4 ช้อยส์ และระบุข้อที่ถูกให้ครบถ้วนถาวรครับ!");
            return;
        }

        const opts = [opt1, opt2, opt3, opt4];
        if(!opts.includes(correct)) {
            alert("⚠️ แจ้งเตือน: คำตอบที่ถูกต้อง จะต้องพิมพ์ให้ตรงกับตัวเลือกใดตัวเลือกหนึ่งใน 4 ตัวเลือกข้างต้นอย่างแม่นยำครับ!");
            return;
        }

        const newQObj = { creator, level, stage, question, options: opts, correct };

        if (editMode) {
            quizDatabase[editSubjectKey].questions[editQuestionIndex] = newQObj;
            alert("🆙 ปรับปรุงแก้ไขเนื้อหาข้อสอบสำเร็จ!");
            editMode = false;
        } else {
            quizDatabase[subKey].questions.push(newQObj);
            alert("💾 บันทึกเพิ่มข้อสอบเข้าคลังสำเร็จ!");
        }

        localStorage.setItem('webcraft_quiz_db', JSON.stringify(quizDatabase));
        showAdminDashboard();
    }

    function editQuestion(subKey, index) {
        editMode = true;
        editSubjectKey = subKey;
        editQuestionIndex = index;

        const q = quizDatabase[subKey].questions[index];
        
        document.getElementById('add-subject').value = subKey;
        document.getElementById('add-creator').value = q.creator || "";
        document.getElementById('add-level').value = q.level || "ประถม";
        document.getElementById('add-stage').value = q.stage || "";
        document.getElementById('add-question').value = q.question;
        document.getElementById('add-opt1').value = q.options[0];
        document.getElementById('add-opt2').value = q.options[1];
        document.getElementById('add-opt3').value = q.options[2];
        document.getElementById('add-opt4').value = q.options[3];
        document.getElementById('add-correct').value = q.correct;

        document.getElementById('form-title').innerText = "✏️ กำลังแก้ไขเนื้อหาข้อสอบ";
        document.getElementById('btn-submit-form').innerText = "🆙 บันทึกการแก้ไขคำถาม";
        document.getElementById('btn-cancel-edit').style.display = "inline-block";
        document.getElementById('form-title').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEditMode() { 
        editMode = false; 
        editSubjectKey = ""; 
        editQuestionIndex = null; 
        showAdminDashboard(); 
    }

    function deleteQuestion(subKey, index) {
        if(confirm("คุณต้องการลบข้อสอบข้อนี้ออกจากคลังถาวรใช่ไหม? ไม่สามารถกู้คืนได้")) {
            if (editMode && editSubjectKey === subKey && editQuestionIndex === index) cancelEditMode();
            quizDatabase[subKey].questions.splice(index, 1);
            localStorage.setItem('webcraft_quiz_db', JSON.stringify(quizDatabase));
            showAdminDashboard();
        }
    }
</script>
